<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Small Promo Tile 440x280</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 440px; height: 280px; overflow: hidden;
    background: #0c0c0e;
    font-family: 'IBM Plex Mono', monospace;
  }
  .wrap {
    width: 440px; height: 280px;
    background: #0c0c0e;
    position: relative;
    display: flex; align-items: center;
    padding: 36px 40px;
    overflow: hidden;
  }
  /* Background glow */
  .wrap::before {
    content: '';
    position: absolute;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(22,163,74,0.14) 0%, transparent 65%);
    top: -100px; right: -60px;
    pointer-events: none;
  }
  .wrap::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #16a34a, rgba(22,163,74,0.2), transparent);
  }
  .content { position: relative; z-index: 1; }
  .icon-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: #ececf0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 18px; color: #18181b;
  }
  .name {
    font-family: 'Syne', sans-serif; font-size: 13px;
    font-weight: 700; color: #ececf0; letter-spacing: 0.2px;
  }
  .tagline-sm { font-size: 9px; color: #5a5a70; margin-top: 2px; }
  .headline {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800; line-height: 1.1;
    color: #ececf0; letter-spacing: -0.8px; margin-bottom: 16px;
  }
  .headline span { color: #4ade80; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    background: rgba(255,255,255,0.05); border: 1px solid #252530;
    border-radius: 99px; padding: 4px 10px;
    font-size: 10px; color: #8b8b9e; letter-spacing: 0.3px;
  }
  .pill.green { border-color: rgba(74,222,128,0.3); color: #4ade80; background: rgba(74,222,128,0.06); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="content">
      <div class="icon-row">
        <div class="icon">N</div>
        <div>
          <div class="name">Notion Date AutoFiller</div>
          <div class="tagline-sm">v1.1.0 · Chrome Extension</div>
        </div>
      </div>
      <div class="headline">Fill dates in<br><span>seconds.</span></div>
      <div class="pills">
        <div class="pill green">✦ Payment Mode</div>
        <div class="pill">Exclude Days</div>
        <div class="pill">Dark Mode</div>
        <div class="pill">300+ Dates</div>
      </div>
    </div>
  </div>
</body>
</html>
